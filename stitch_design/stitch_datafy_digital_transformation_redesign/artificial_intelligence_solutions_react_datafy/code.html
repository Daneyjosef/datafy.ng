<script type="text/babel">
        const { useState, useEffect } = React;
        const { 
            Search, 
            Menu, 
            X, 
            BarChart3, 
            Cpu, 
            Headphones, 
            FileText, 
            Zap,

            ChevronRight,

        // --- Reusable Components ---

        const Nav = () => {
            const [isScrolled, setIsScrolled] = useState(false);
            const [isMobileMenuOpen, setIsMobileMenuOpen] = useState(false);

            useEffect(() => {
                const handleScroll = () => {
                    setIsScrolled(window.scrollY > 20);
                };
                window.addEventListener('scroll', handleScroll);
                return () => window.removeEventListener('scroll', handleScroll);
            }, []);

            return (
                <nav className={`bg-surface/80 backdrop-blur-xl fixed top-0 w-full z-50 border-b border-outline-variant/20 shadow-sm transition-all duration-300 ${isScrolled ? 'h-16' : 'h-20'}`}>

                        <div className="flex items-center gap-base">

                        </div>

                                <a key={item} className="text-on-surface-variant hover:text-primary transition-colors font-body-md text-lg" href="#">{item}</a>

        };

        const Hero = () => (

                        <p className="font-body-lg text-body-lg text-on-surface-variant max-w-xl mb-12">
                            Leverage AI to automate repetitive tasks, improve customer experiences, and make smarter business decisions with our bespoke neural frameworks.
                        </p>
                        <div className="flex flex-wrap gap-4">
                            <button className="bg-primary text-on-primary px-8 py-4 rounded-DEFAULT font-headline-md text-[18px] hover:bg-secondary transition-colors">
                                Deploy AI Solutions
                            </button>
                            <button className="border border-outline-variant px-8 py-4 rounded-DEFAULT font-headline-md text-[18px] hover:bg-surface-container-low transition-colors">

                        </div>
                    </div>
                    <div className="lg:col-span-5 relative">
                        <div className="relative w-full aspect-square bg-surface-container-low rounded-full flex items-center justify-center animate-float">
                            <div className="glass-card p-8 rounded-xl shadow-xl w-64 absolute -top-4 -right-4 z-20">
                                <div className="flex items-center gap-3 mb-4">
                                    <BarChart3 className="text-secondary" size={20} />
                                    <span className="font-label-sm text-label-sm uppercase">Decision Engine</span>
                                </div>
                                <div className="h-2 w-full bg-surface-container-highest rounded-full overflow-hidden">
                                    <div className="bg-secondary h-full w-[85%]"></div>
                                </div>
                                <p className="text-[10px] mt-2 text-on-surface-variant">Efficiency Optimization: 85%</p>
                            </div>
                        </div>
                    </div>
                </div>
            </section>
        );

        const FeatureGrid = () => (
            <section className="py-24 px-margin-desktop max-w-container-max mx-auto">
                <div className="mb-20 text-center max-w-3xl mx-auto">
                    <h2 className="font-headline-lg text-headline-lg mb-6">Our AI Capabilities</h2>
                    <p className="font-body-md text-body-md text-on-surface-variant">
                        We bridge the gap between experimental AI and production-ready enterprise technology, focusing on five key transformation pillars.
                    </p>
                </div>
                <div className="grid grid-cols-1 md:grid-cols-3 md:grid-rows-2 gap-gutter h-auto md:h-[800px]">
                    <div className="md:col-span-2 md:row-span-1 group relative bg-primary-container text-on-primary overflow-hidden rounded-lg p-10 flex flex-col justify-end">
                        <div className="absolute top-0 right-0 p-10 opacity-10 group-hover:opacity-20 transition-opacity">

                        </div>
                        <div className="z-10">
                            <span className="font-label-sm text-label-sm uppercase text-secondary-fixed mb-4 block">Process optimization</span>
                            <h3 className="font-headline-md text-headline-md mb-4">AI Business Automation</h3>

                    <div className="md:col-span-1 md:row-span-1 bg-surface-container-low rounded-lg p-10 flex flex-col justify-between">
                        <div>
                            <FileText className="text-primary mb-6" size={40} />

                        </div>
                        <p className="font-body-md text-on-surface-variant">Extract structured insights from millions of unstructured documents in seconds.</p>
                    </div>

                    <div className="md:col-span-2 md:row-span-1 grid grid-cols-1 md:grid-cols-2 gap-gutter">
                        <div className="border border-outline-variant/30 rounded-lg p-10 hover:bg-surface-bright transition-all flex flex-col justify-between">
                            <div>
                                <h3 className="font-headline-md text-[24px] mb-3">Predictive Analytics</h3>
                                <p className="font-body-md text-on-surface-variant mb-6">Anticipate market shifts and consumer behavior before they happen.</p>
                            </div>
                            <div className="flex gap-1 h-12 items-end">
                                <div className="w-2 bg-secondary/20 h-4"></div>
                                <div className="w-2 bg-secondary/40 h-8"></div>
                                <div className="w-2 bg-secondary/60 h-6"></div>

                            <div>
                                <h3 className="font-headline-md text-[24px] mb-3">Generative AI Integration</h3>

        const StrategySection = () => (
            <section className="py-32 bg-surface-container-low/40">
                <div className="px-margin-desktop max-w-container-max mx-auto grid grid-cols-1 lg:grid-cols-2 gap-20 items-center">
                    <div className="relative rounded-xl overflow-hidden shadow-2xl h-[600px]">

                            className="w-full h-full object-cover" 
                            alt="Business executives reviewing data visualizations"
                            src="https://lh3.googleusercontent.com/aida-public/AB6AXuAmHQ9c1IuU8JJh1DI-8EgLtC_gPM80_BdAT0aZBMT01Ci6hBUauvYeMDSyqHv5ODA_XrBx32XJgCxIzY0vuo4OiEDQREuupHrbXKomsoPOiTZzeoHlr6UmGwVIuaINQ1r1kvyqh8AMwP6SnIqOXtMixFoJBSvHVuRdOxzoS5cXSilnoKG2kwpLQLKN_Ev-WQZTgGellEafE9dQCzsHC-tqgdb9Be8wJzHf95KxKGdmL-LIrMM1rMYT"

                        <div className="absolute bottom-10 left-10 right-10">
                            <div className="glass-card p-6 rounded-lg">
                                <p className="font-body-md text-on-primary-fixed italic">"Datafy's strategy wasn't just about the technology; it was about reimagining our entire service model through the lens of intelligence."</p>

                                    <span className="font-label-sm text-label-sm uppercase">Global Head of Digital, FinTech Africa</span>
                                    <ShieldCheck className="text-secondary" size={20} />
                                </div>
                            </div>
                        </div>
                    </div>
                    <div>
                        <span className="font-label-sm text-label-sm uppercase tracking-widest text-secondary mb-6 block">The Transformation Journey</span>
                        <h2 className="font-headline-lg text-headline-lg mb-8 leading-tight">Strategy & <span className="font-normal italic">Consulting</span></h2>
                        <p className="font-body-md text-body-md text-on-surface-variant mb-12">
                            We don't just build models; we architect transformation. Our consulting team works with C-suite leaders to define AI roadmaps that align with specific business outcomes, ensuring every investment delivers measurable ROI.

                        <div className="space-y-8">
                            {[
                                { id: '01', title: 'Feasibility Assessment', desc: 'Rigorous audit of data infrastructure and organizational readiness for AI adoption.' },
                                { id: '02', title: 'Ethical Governance', desc: 'Developing frameworks for responsible AI usage, data privacy, and bias mitigation.' },
                                { id: '03', title: 'Change Management', desc: 'Training and cultural alignment to ensure seamless human-AI collaboration.' }
                            ].map((step) => (
                                <div key={step.id} className="flex gap-6">
                                    <div className="w-12 h-12 rounded-full border border-secondary flex items-center justify-center shrink-0">
                                        <span className="font-label-sm text-secondary">{step.id}</span>
                                    </div>
                                    <div>

                                        <p className="text-on-surface-variant">{step.desc}</p>
                                    </div>
                                </div>
                            ))}
                        </div>
                        <button className="mt-12 group flex items-center gap-3 font-headline-md text-[18px] text-primary hover:text-secondary transition-colors">
                            Book a Strategy Session
                            <ArrowRight className="group-hover:translate-x-2 transition-transform" size={20} />

        const StatsSection = () => (
            <section className="py-24 px-margin-desktop max-w-container-max mx-auto border-y border-outline-variant/10">
                <div className="flex flex-col md:flex-row justify-between items-end mb-20 gap-10">
                    <div className="max-w-xl">
                        <h2 className="font-headline-lg text-headline-lg mb-6">Real-Time Precision</h2>
                        <p className="font-body-md text-body-md text-on-surface-variant">
                            Our models operate at the edge of possibility, delivering sub-second latency and unprecedented precision in high-stakes environments.
                        </p>
                    </div>
                    <div className="flex gap-12">
                        <div className="text-center">
                            <div className="font-display-lg text-[64px] text-primary">0.4s</div>
                            <span className="font-label-sm uppercase tracking-widest text-on-surface-variant">Latency</span>
                        </div>
                        <div className="text-center">
                            <div className="font-display-lg text-[64px] text-secondary">99%</div>
                            <span className="font-label-sm uppercase tracking-widest text-on-surface-variant">Precision</span>
                        </div>
                    </div>
                </div>
                <div className="w-full h-[400px] bg-surface-container rounded-xl relative overflow-hidden flex items-center justify-center">
                    <div className="glass-card px-10 py-8 rounded-full border border-white/20">
                        <span className="font-label-sm text-label-sm tracking-widest text-primary uppercase">Neural Network Status: Optimized</span>
                    </div>
                </div>
            </section>
        );

        const CTASection = () => (
            <section className="py-40 text-center">
                <div className="px-margin-desktop max-w-3xl mx-auto">
                    <h2 className="font-display-lg text-display-lg mb-10">Ready to automate the <span className="italic font-normal">impossible?</span></h2>
                    <p className="font-body-lg text-body-lg text-on-surface-variant mb-12">
                        Connect with our solution architects to build a custom AI ecosystem for your enterprise.
                    </p>
                    <button className="bg-primary-container text-on-primary px-12 py-6 rounded-DEFAULT font-headline-md text-[20px] hover:bg-primary transition-all shadow-xl active:scale-95">
                        Consult Our Engineers
                    </button>
                </div>
            </section>
        );

        const Footer = () => (
            <footer className="bg-primary-container text-on-primary-fixed full-width py-20 border-t border-primary/10">
                <div className="grid grid-cols-1 md:grid-cols-4 gap-gutter px-margin-desktop max-w-container-max mx-auto">
                    <div className="md:col-span-1">
                        <span className="font-headline-md text-headline-md text-on-primary mb-6 block">Datafy Technology</span>
                        <p className="font-body-md opacity-60">© 2024 Datafy Technology.<br/>African Excellence, Global Impact.</p>
                    </div>
                    <div>
                        <h5 className="font-label-sm text-label-sm uppercase tracking-widest text-secondary-fixed mb-8">Global Reach</h5>
                        <ul className="space-y-4">
                            {['Global Headquarters', 'Lagos Hub', 'Nairobi Office'].map(link => (
                                <li key={link}><a className="text-on-primary-fixed-variant hover:text-on-primary transition-all hover:underline" href="#">{link}</a></li>
                            ))}
                        </ul>
                    </div>
                    <div>
                        <h5 className="font-label-sm text-label-sm uppercase tracking-widest text-secondary-fixed mb-8">Ethics</h5>
                        <ul className="space-y-4">
                            {['Sustainability', 'Privacy Architecture', 'AI Bill of Rights'].map(link => (
                                <li key={link}><a className="text-on-primary-fixed-variant hover:text-on-primary transition-all hover:underline" href="#">{link}</a></li>
                            ))}
                        </ul>
                    </div>
                    <div>
                        <h5 className="font-label-sm text-label-sm uppercase tracking-widest text-secondary-fixed mb-8">Newsletter</h5>
                        <div className="flex border-b border-outline-variant/30 pb-2">
                            <input className="bg-transparent border-none focus:ring-0 text-on-primary-fixed placeholder:text-on-primary-fixed/40 w-full outline-none" placeholder="Email address" type="email"/>
                            <button className="text-on-primary hover:translate-x-1 transition-transform">
                                <ArrowRight size={20} />
                            </button>
                        </div>
                    </div>
                </div>
            </footer>
        );

        // --- Main App Component ---

        const App = () => {
            useEffect(() => {
                const observerOptions = { threshold: 0.1 };
                const observer = new IntersectionObserver((entries) => {
                    entries.forEach(entry => {
                        if (entry.isIntersecting) {
                            entry.target.classList.add('opacity-100', 'translate-y-0');
                            entry.target.classList.remove('opacity-0', 'translate-y-10');
                        }
                    });
                }, observerOptions);

                document.querySelectorAll('section').forEach(section => {
                    section.classList.add('transition-all', 'duration-1000', 'opacity-0', 'translate-y-10');
                    observer.observe(section);
                });

                return () => observer.disconnect();
            }, []);

            return (
                <div className="min-h-screen">
                    <Nav />
                    <main>
                        <Hero />
                        <FeatureGrid />
                        <StrategySection />
                        <StatsSection />
                        <CTASection />
                    </main>
                    <Footer />
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body></html>
